version: '3.8'

services:
  sniffer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gopacketsniffer
    network_mode: host          # access host network interfaces directly
    cap_add:
      - NET_RAW                 # required for AF_PACKET raw sockets
      - NET_ADMIN               # required for promiscuous mode
    command: ["-i", "eth0", "-v"]
    volumes:
      - ./captures:/captures    # mount for -w pcap output
    restart: unless-stopped

  # Optional traffic generator — useful for local testing.
  # Run: docker-compose --profile test up
  traffic-gen:
    image: alpine:3.20
    container_name: traffic-generator
    profiles: ["test"]
    command: >
      sh -c "apk add --no-cache curl &&
             while true; do
               curl -s http://example.com > /dev/null;
               sleep 5;
             done"
    depends_on:
      - sniffer
