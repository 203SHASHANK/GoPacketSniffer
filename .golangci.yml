version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert
    - unparam

linters-settings:
  errcheck:
    check-type-assertions: true

issues:
  exclude-rules:
    # Test files are allowed to ignore errors in defer/cleanup
    - path: "_test\\.go"
      linters: [errcheck]
